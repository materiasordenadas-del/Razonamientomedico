<html lang="es">
<head>
<meta charset="utf-8" />

<title>H-CR v3 — Caso clínico</title>
<style>
:root{--bg:#f4f6fb;--surface:#fff;--ink:#172033;--muted:#6a7485;--line:#d8deea;--dark:#172033;--accent:#3858e9;--accent2:#eef2ff;--soft:#f8fafc;--good:#126c42;--warn:#a34b00;--danger:#a32525;--dx1:rgba(49,104,230,.22);--dx2:rgba(27,160,97,.20);--dx3:rgba(231,134,37,.22)}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;font-size:14px;line-height:1.42}
button,input,textarea,select{font:inherit} button{cursor:pointer}

.start-card{width:min(680px,100%);background:#fff;border:1px solid var(--line);border-radius:22px;padding:54px 32px;text-align:center;box-shadow:0 18px 60px rgba(25,39,75,.11)}
.start-card h1{font-size:40px;margin:0 0 18px;letter-spacing:-.03em}.start-card p{color:var(--muted);font-size:16px;margin:0 0 34px}.start-card .continue{background:var(--dark);color:white;border:0;border-radius:12px;padding:12px 28px;font-weight:750}
#app{display:none;min-height:100vh}.topbar{background:var(--dark);color:#fff;padding:12px 16px;position:sticky;top:0;z-index:20;box-shadow:0 1px 8px rgba(0,0,0,.18)}
.topbar-inner{max-width:1700px;margin:auto;display:flex;align-items:center;gap:12px}.topbar-title{font-weight:800;white-space:nowrap}.topbar-meta{font-size:12px;color:#cbd5e1}.topbar-spacer{flex:1}.small-btn{border:1px solid #52607a;background:transparent;color:white;border-radius:9px;padding:7px 10px;font-size:12px}
.tabs{display:flex;gap:6px;overflow:auto;padding:10px 14px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:48px;z-index:15}.tab{white-space:nowrap;border:1px solid var(--line);background:#fff;color:#34405a;border-radius:9px;padding:7px 10px;font-size:12px;font-weight:700}.tab.active{background:#e9edff;border-color:#9aaaf9;color:#233baf}
#workspace{max-width:1700px;margin:auto;display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:14px;padding:14px}.pad-collapsed #workspace{grid-template-columns:minmax(0,1fr) 48px}.pad-collapsed .pad-body{display:none}.pad-collapsed .pad{padding:8px;overflow:hidden}.pad-collapsed .pad h2{font-size:12px;writing-mode:vertical-rl;margin:auto}.pad-collapsed .pad-toggle{width:30px;padding:5px}
.module{display:none}.module.active{display:block}.module-intro{margin-bottom:10px}.module-intro h1{font-size:21px;margin:0}.module-intro p{color:var(--muted);margin:4px 0 0}
.card{background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:14px;margin-bottom:12px;box-shadow:0 2px 9px rgba(26,41,76,.035)}
.card h2{font-size:16px;margin:0 0 8px}.card h3{font-size:14px;margin:12px 0 6px}.subtle{font-size:12px;color:var(--muted)}
.m1-grid{display:grid;grid-template-columns:minmax(240px,.8fr) minmax(480px,1.7fr);gap:12px}.triage-panel{align-self:start}.conversation-panel{min-width:0}.section-title{font-weight:800;font-size:13px;margin:0 0 8px}.patient-identity{margin:0 0 9px;padding:8px 10px;border-radius:9px;background:#f3f5fa;border:1px solid #dbe1ec;font-size:13px}.data-row,.selectable{display:flex;align-items:flex-start;gap:8px;border:1px solid #dbe1ec;border-radius:10px;padding:8px 9px;background:#fff;margin:6px 0;max-width:100%}.data-row:hover,.selectable:hover{border-color:#9aaaf9}.selected{background:#f0f3ff!important;border-color:#6f82ef!important}.data-row input,.selectable input{width:16px;height:16px;accent-color:var(--accent);margin:1px 0 0}.fact-label{display:block;min-width:0}.fact-hint{display:block;font-size:11px;color:var(--muted);margin-top:2px}
.dialogue{border-left:3px solid #d9e0ff;background:#fbfcff;border-radius:0 11px 11px 0;padding:10px 10px 10px 12px;margin:8px 0}.doctor{font-weight:750;margin:0 0 5px}.patient-details{margin:0}.patient-details summary{list-style:none;display:flex;gap:8px;align-items:flex-start;cursor:pointer;color:#243354}.patient-details summary::-webkit-details-marker{display:none}.patient-details summary::before{content:'▸';color:#6b7feb;line-height:1.4;font-size:13px}.patient-details[open] summary::before{content:'▾'}.patient-text{flex:1}.patient-check{width:16px;height:16px;accent-color:var(--accent);margin-top:2px}.deeper{margin:8px 0 0 23px;padding:9px;background:#fff;border:1px solid #e1e6f0;border-radius:9px}.deeper .dialogue{margin:7px 0;background:#fbfcff}
.accordion{border:1px solid var(--line);border-radius:12px;background:#fff;margin:8px 0;overflow:hidden}.accordion summary{padding:10px 12px;background:#fafbfe;font-weight:800;cursor:pointer;list-style:none}.accordion summary::-webkit-details-marker{display:none}.accordion summary::after{content:'＋';float:right;color:#667085}.accordion[open] summary::after{content:'−'}.accordion-body{padding:10px 12px}
.category-chip{display:inline-block;background:#edf1ff;color:#3346a7;padding:2px 7px;border-radius:999px;font-size:11px;font-weight:700;margin:0 4px 5px 0}
.guidance{border-left:3px solid #aab6ee;background:#f7f8ff;border-radius:0 10px 10px 0;padding:9px 11px;color:#4f5d88;font-size:12px;margin:8px 0}.field{margin:12px 0}.field-title{font-size:12px;font-weight:850;letter-spacing:.03em;text-transform:uppercase;margin-bottom:3px}.field-instruction{font-size:12px;color:var(--muted);margin-bottom:5px}.field textarea,.field input{width:100%;border:1px solid var(--line);border-radius:10px;padding:9px 10px;background:#fff;color:var(--ink)}.field textarea{min-height:84px;resize:vertical}.field input{min-height:39px}.copy-prev{font-size:12px;border:1px solid #b7c2e8;background:#f8f9ff;border-radius:8px;padding:6px 8px;color:#4056b9;margin:5px 0 8px}
.tier-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.tier-card{border:1px solid var(--line);border-radius:11px;padding:10px;background:#fcfdff}.tier-card h4{margin:0 0 5px;font-size:13px}.tier-card p{margin:0 0 8px;color:var(--muted);font-size:12px}.tier-card input,.tier-card textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px;margin-top:6px}.tier-card textarea{min-height:62px;resize:vertical}
.pad{position:sticky;top:105px;align-self:start;max-height:calc(100vh - 120px);overflow:auto;padding:12px}.pad-header{display:flex;justify-content:space-between;align-items:center;gap:6px}.pad h2{margin:0;font-size:15px}.pad-toggle{border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 7px;color:#49566e}.pad-meta{display:flex;gap:5px;flex-wrap:wrap;margin:9px 0}.badge{font-size:11px;border-radius:999px;background:#f0f2f8;color:#4b586f;padding:3px 7px}.pad details{border:1px solid #e2e6ef;border-radius:9px;margin:6px 0;background:#fff}.pad summary{cursor:pointer;padding:7px 8px;font-size:12px;font-weight:750}.pad ul{margin:0;padding:0 10px 8px 24px;font-size:12px}.pad li{margin:4px 0}.pad .empty{font-size:12px;color:var(--muted);padding:9px 0}.pad .pad-note{font-size:12px;line-height:1.35;color:#3b4861;background:#f8f9fc;border:1px dashed #d8dee9;border-radius:9px;padding:8px;margin:6px 0}
.lab-table{width:100%;border-collapse:collapse;font-size:13px}.lab-table th,.lab-table td{border:1px solid var(--line);padding:7px;text-align:left;vertical-align:top}.lab-table th{background:#f7f8fb;font-size:12px}.lab-check{width:16px;height:16px;accent-color:var(--accent)}
.venn-top{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin:10px 0}.venn-top .field{margin:0}.venn-layout{display:grid;grid-template-columns:300px minmax(780px,1fr);gap:12px}.finding-source{max-height:640px;overflow:auto}.finding-group{padding:8px 0;border-bottom:1px solid #e4e8f0}.finding-group:last-child{border:0}.finding-group-title{font-size:12px;font-weight:850;color:#37456c;margin:0 0 6px}.finding-chip{display:inline-flex;width:fit-content;max-width:100%;align-items:center;gap:4px;border:1px solid #cdd5e4;background:#fff;border-radius:999px;padding:5px 8px;margin:3px 3px 3px 0;font-size:12px;cursor:grab;user-select:none}.finding-chip:hover{border-color:#8093ef;background:#f5f6ff}.finding-chip .tag{font-size:10px;color:#6b7280}.venn-board{position:relative;height:650px;border:1px solid var(--line);border-radius:15px;overflow:hidden;background:radial-gradient(circle at 1px 1px,#e5e9f1 1px,transparent 1px);background-size:26px 26px}.circle{position:absolute;width:350px;height:350px;border-radius:50%;pointer-events:none;border:2px solid}.circle.dx1{left:150px;top:115px;background:var(--dx1);border-color:#3865df}.circle.dx2{left:410px;top:115px;background:var(--dx2);border-color:#2b9a62}.circle.dx3{left:280px;top:305px;background:var(--dx3);border-color:#db8420}.zone{position:absolute;border:1px dashed #8b98ae;border-radius:10px;background:rgba(255,255,255,.74);padding:6px;overflow:auto}.zone-title{font-size:10px;font-weight:850;color:#3f4b61;margin-bottom:4px}.zone.z1{left:86px;top:188px;width:175px;height:132px}.zone.z2{left:651px;top:188px;width:175px;height:132px}.zone.z3{left:365px;top:543px;width:175px;height:88px}.zone.z12{left:400px;top:148px;width:185px;height:105px}.zone.z13{left:237px;top:424px;width:185px;height:96px}.zone.z23{left:552px;top:424px;width:185px;height:96px}.zone.z123{left:416px;top:327px;width:190px;height:100px;border:2px dashed #26324b}.zone.return{left:14px;bottom:14px;width:230px;height:94px;background:#fffdf7;border-color:#c59120}.drop-over{background:#fff2c7!important;border-color:#d89000!important}.placed{cursor:grab;font-size:11px;white-space:normal;padding:4px 6px;margin:3px;border-radius:8px;border:1px solid #cbd5e1;background:#fff}.placed small{color:#6a7485}.venn-log{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px}.venn-log th,.venn-log td{border:1px solid var(--line);padding:6px;text-align:left}.venn-log th{background:#f7f8fb}.eval-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.eval-col{border:1px solid var(--line);border-radius:12px;padding:12px}.eval-col h3{margin:0 0 8px}.placeholder{color:#8090a7;font-size:12px;border:1px dashed #cad2e1;border-radius:9px;padding:10px;background:#fafbfd}.eval-row{border-top:1px solid #e4e8ef;padding:9px 0}.eval-row:first-child{border-top:0}.eval-label{font-size:11px;font-weight:850;text-transform:uppercase;color:#667085}.eval-value{font-size:13px;margin-top:2px;white-space:pre-wrap}.import-box{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.action{background:var(--dark);color:#fff;border:0;border-radius:9px;padding:9px 11px;font-weight:750}.action.secondary{background:#475569}.action.light{background:#eef2ff;color:#3448ad;border:1px solid #c8d1ff}.warn{background:#9d4a09}.footer-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;margin-top:14px}
@media(max-width:1200px){#workspace{grid-template-columns:1fr}.pad{position:static;max-height:none}.pad-collapsed #workspace{grid-template-columns:1fr}.pad-collapsed .pad{display:none}.m1-grid,.venn-layout{grid-template-columns:1fr}.venn-layout .card{overflow:auto}.venn-board{min-width:850px}.tier-grid,.venn-top,.eval-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<section id="startScreen">
  <div class="start-card">
    <h1>Caso clinico</h1>
    <p>Diseñado por Adriel Pereira estudiante de medicina universidad del Zulia.</p>
    <button class="continue" id="beginCase">Continuar</button>
  </div>
</section>

<div id="app">
  <header class="topbar"><div class="topbar-inner"><div class="topbar-title">H-CR v3</div><div class="topbar-meta">Simulación clínica y adquisición de datos</div><div class="topbar-spacer"></div><button class="small-btn" id="togglePad">Minimizar Pad diagnóstico</button></div></header>
  <nav class="tabs" id="tabs"></nav>
  <div id="workspace">
    <main id="modules"></main>
    <aside class="card pad" id="pad">
      <div class="pad-header"><h2>Pad diagnóstico</h2><button class="pad-toggle" id="padSideBtn">−</button></div>
      <div class="pad-body">
        <div class="pad-meta"><span class="badge" id="timeBadge">Módulo 1</span><span class="badge" id="selectedBadge">0 datos</span></div>
        <div id="padGroups"></div>
        <h3>Enfermedad actual</h3><div class="pad-note" id="padIllness">Pendiente</div>
        <h3>Diagnóstico sindromático</h3><div class="pad-note" id="padSyndrome">Pendiente</div>
        <h3>Tier 3 actual</h3><div class="pad-note" id="padTier">Pendiente</div>
      </div>
    </aside>
  </div>
</div>

<script>
const STORAGE='hcr_v3_cardiac_hidden_v2';
const sourceOrder=['Triage','Interrogatorio / anamnesis','Historial','Examen funcional','Examen físico','Paraclínicos'];
const state=JSON.parse(localStorage.getItem(STORAGE)||'null')||{started:false,current:'m1',selected:{},fields:{},expanded:{},venn:{placed:{},dx:['','','']},expert:null};
function save(){localStorage.setItem(STORAGE,JSON.stringify(state));}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
function selectedCount(){return Object.keys(state.selected).length}
function selectFinding(id,source,text,checked){if(checked) state.selected[id]={id,source,text}; else {delete state.selected[id]; delete state.venn.placed[id];}save();renderPad();if(state.current==='m5')renderVenn();}
function isSelected(id){return !!state.selected[id]}
function choice(id,source,text,hint=''){return `<label class="selectable ${isSelected(id)?'selected':''}"><input class="finding-check" type="checkbox" data-id="${esc(id)}" data-source="${esc(source)}" data-text="${esc(text)}" ${isSelected(id)?'checked':''}><span class="fact-label">${esc(text)}${hint?`<span class="fact-hint">${esc(hint)}</span>`:''}</span></label>`}
function markExpanded(id,open){state.expanded[id]=open;save();}
function patientBlock(id,source,doctor,patient,deeper=''){return `<div class="dialogue"><div class="doctor">Médico: ${esc(doctor)}</div><details class="patient-details" ${state.expanded[id]?'open':''} ontoggle="markExpanded('${id}',this.open)"><summary><input class="patient-check finding-check" type="checkbox" data-id="${esc(id)}" data-source="${esc(source)}" data-text="${esc(patient)}" ${isSelected(id)?'checked':''} onclick="event.stopPropagation()"><span class="patient-text"><b>Paciente:</b> ${esc(patient)}</span></summary>${deeper?`<div class="deeper">${deeper}</div>`:''}</details></div>`}
function prevCard(previousKey,targetKey){const v=state.fields[previousKey]||'';return `<div class="guidance"><b>Versión anterior visible:</b> ${v?esc(v):'Aún no existe una versión previa.'}<br>${v?`<button class="copy-prev" onclick="copyField('${previousKey}','${targetKey}')">Usar esta versión como base</button>`:''}</div>`}
function field(key,title,instruction,placeholder='',area=true){const val=state.fields[key]||'';return `<div class="field"><div class="field-title">${esc(title)}</div><div class="field-instruction">${esc(instruction)}</div>${area?`<textarea id="${key}" placeholder="${esc(placeholder)}" oninput="setField('${key}',this.value)">${esc(val)}</textarea>`:`<input id="${key}" value="${esc(val)}" placeholder="${esc(placeholder)}" oninput="setField('${key}',this.value)">`}</div>`}
function setField(key,val){state.fields[key]=val;save();renderPad();renderEvaluationStudent();}
function copyField(from,to){state.fields[to]=state.fields[from]||'';save();const el=document.getElementById(to);if(el)el.value=state.fields[to];renderPad();}
function tier(phase){const p={m1:['iniciales','m1'],m2:['actualizados tras el historial','m2'],m3:['actualizados tras el examen físico','m3'],m4:['finales tras paraclínicos','m4']}[phase]; const labels=[['Diagnóstico principal','El diagnóstico que mejor explica los datos disponibles.'],['Diagnóstico secundario','La alternativa razonable o mejor imitador.'],['Diagnóstico fatal que no puedo perder','La amenaza grave que debes mantener abierta.']]; return `<h3>Tier 3 diagnósticos ${p[0]}</h3><div class="tier-grid">${labels.map((x,i)=>`<div class="tier-card"><h4>${x[0]}</h4><p>${x[1]}</p><input placeholder="Nombre del diagnóstico" value="${esc(state.fields[`tier_${p[1]}_${i+1}`]||'')}" oninput="setField('tier_${p[1]}_${i+1}',this.value)"><textarea placeholder="Explica en una frase qué datos lo sostienen." oninput="setField('tier_${p[1]}_${i+1}_why',this.value)">${esc(state.fields[`tier_${p[1]}_${i+1}_why`]||'')}</textarea></div>`).join('')}</div>`}
function phaseClose(phase){const cfg={m1:{ill:'ill_m1',title:'Enfermedad actual de triage',ins:'Redacta una síntesis clínica utilizando exclusivamente los datos que seleccionaste en Triage e Interrogatorio / anamnesis.',prev:null,synd:false},m2:{ill:'ill_m2',title:'Enfermedad actual actualizada tras el historial',ins:'Reformula la síntesis incorporando solamente los datos del Historial y Examen funcional que cambian el problema.',prev:'ill_m1',synd:true},m3:{ill:'ill_m3',title:'Enfermedad actual actualizada tras el examen físico',ins:'Reformula la síntesis con los datos seleccionados durante el examen físico.',prev:'ill_m2',synd:true},m4:{ill:'ill_m4',title:'Enfermedad actual actualizada tras los paraclínicos',ins:'Reformula la síntesis final con los estudios que cambian tu interpretación clínica.',prev:'ill_m3',synd:true}}[phase];return `<div class="card">${cfg.prev?prevCard(cfg.prev,cfg.ill):''}${field(cfg.ill,cfg.title,cfg.ins,'Ej.: Adulto… con evolución… caracterizado por… en contexto de… con…')}${cfg.synd?field('syndrome_'+phase,'Diagnóstico sindromático','Escribe el síndrome construido con los hallazgos disponibles. No escribas una etiología.','Ej.: Síndrome de insuficiencia cardiaca aguda descompensada.',false):''}${tier(phase)}</div>`}
function renderM1(){return `<section class="module active"><div class="module-intro"><h1>Módulo 1 — Triage e interrogatorio / anamnesis</h1><p>Selecciona únicamente los datos que consideres clínicamente útiles. Las respuestas del paciente pueden desplegarse para profundizar.</p></div><div class="m1-grid"><div class="card triage-panel"><h2>Triage</h2><div class="patient-identity"><b>Paciente:</b> Carlos Méndez</div><p class="subtle">Datos generales disponibles al ingreso.</p><div>${[
['t01','Edad: 67 años'],['t02','Sexo: masculino'],['t03','Procedencia: domicilio urbano'],['t04','Motivo referido en admisión: “me está faltando el aire”'],['t05','Temperatura: 36,8 °C'],['t06','PA: 166/94 mmHg'],['t07','FC: 112 lpm'],['t08','FR: 26 rpm'],['t09','SatO₂: 90% al aire ambiente'],['t10','Estado mental: despierto, responde adecuadamente'],['t11','Llega acompañado por una hija'],['t12','Hora de llegada: 19:40']
].map(x=>choice(x[0],'Triage',x[1])).join('')}</div></div><div class="card conversation-panel"><h2>Interrogatorio / anamnesis</h2><p class="subtle">Usa la flecha de cada respuesta para profundizar. Marca la respuesta del paciente cuando quieras conservarla en tu Pad diagnóstico.</p>${patientBlock('i01','Interrogatorio / anamnesis','¿Qué le está pasando hoy?','Desde hace unos días siento que el aire no me alcanza.', patientBlock('i01a','Interrogatorio / anamnesis','¿Cuándo nota más esa falta de aire?','Cuando me acuesto se pone peor; tengo que dormir casi sentado.', patientBlock('i01b','Interrogatorio / anamnesis','¿Se despierta por la noche por esa sensación?','Sí, ya van dos noches que me despierto y tengo que sentarme un rato para calmarme.')))}${patientBlock('i02','Interrogatorio / anamnesis','¿Ha notado algo más además de eso?','Los zapatos me quedan más apretados y los tobillos se me ven hinchados al final del día.',patientBlock('i02a','Interrogatorio / anamnesis','¿Eso de los tobillos ocurre solo de un lado o de los dos?','De los dos, aunque a veces el derecho se me ve un poquito peor.'))}${patientBlock('i03','Interrogatorio / anamnesis','¿Tiene dolor o presión en el pecho ahora mismo?','No, dolor fuerte no tengo. A veces siento el pecho pesado cuando me falta mucho el aire.')}${patientBlock('i04','Interrogatorio / anamnesis','¿Ha tenido fiebre, escalofríos o se ha sentido engripado?','No, no he tenido fiebre ni escalofríos.')}${patientBlock('i05','Interrogatorio / anamnesis','¿Ha tosido?','Sí, una tos seca de vez en cuando; no he sacado flema amarilla ni sangre.')}${patientBlock('i06','Interrogatorio / anamnesis','¿Ha sentido que el corazón le corre o late raro?','A ratos lo siento más rápido, sobre todo cuando camino al baño.')}${patientBlock('i07','Interrogatorio / anamnesis','¿Ha viajado mucho o ha pasado días sin caminar?','No. Esta semana estuve casi siempre en la casa viendo televisión.')}${patientBlock('i08','Interrogatorio / anamnesis','¿Ha cambiado algo en sus comidas o en sus medicamentos estos días?','He comido bastante salado porque vino familia el fin de semana.')}</div></div>${phaseClose('m1')}<div class="footer-actions"><button class="action" onclick="goModule('m2')">Continuar a Historial</button></div></section>`}
function renderM2(){const hist=(title,body)=>`<details class="accordion"><summary>${title}</summary><div class="accordion-body">${body}</div></details>`;return `<section class="module active"><div class="module-intro"><h1>Módulo 2 — Historial – Examen funcional subjetivo</h1><p>Explora los apartados que consideres pertinentes. Los datos incluyen positivos, negativos y distractores propios de este paciente.</p></div><div class="card"><h2>Historial</h2>${hist('Antecedentes personales y patológicos',[
['h01','Hipertensión arterial conocida desde hace más de 15 años'],['h02','Diabetes mellitus tipo 2 conocida'],['h03','Niega infarto, angioplastia o cirugía cardiaca previa'],['h04','No conoce enfermedad renal previa'],['h05','Niega asma, EPOC o uso de inhaladores'],['h06','Una hospitalización por “falta de aire” hace aproximadamente dos años'],['h07','Niega neumonía o infección respiratoria reciente'],['h08','Antecedente de cirugía de hernia inguinal hace 20 años']
].map(x=>choice(x[0],'Historial',x[1])).join(''))}${hist('Medicamentos',[

ación','Explica qué informarías al paciente/familiar, qué consentimiento puede requerirse y qué barreras de adherencia debes identificar.','Explicación, riesgos, barreras…')}${field('concern','Nivel de preocupación','Escribe si tu nivel de preocupación es alto o bajo y justifica con hallazgos fisiológicos concretos.','Alto/Bajo — justificación…')}</div><div class="footer-actions"><button class="action secondary" onclick="goModule('m5')">Volver</button><button class="action" onclick="goModule('m7')">Continuar a evaluación</button></div></section>`}
function phaseData(phase){const map={m1:['ill_m1','tier_m1'],m2:['ill_m2','tier_m2'],m3:['ill_m3','tier_m3'],m4:['ill_m4','tier_m4']};const [ill,prefix]=map[phase];return {illness:state.fields[ill]||'',tiers:[1,2,3].map(i=>state.fields[`${prefix}_${i}`]||'')};}
function studentEvalRows(){return [['Triage e interrogatorio',phaseData('m1')],['Tras Historial',phaseData('m2')],['Tras examen físico',phaseData('m3')],['Tras Paraclínicos',phaseData('m4')]].map(([title,d])=>`<div class="eval-row"><div class="eval-label">${title}</div><div class="eval-value"><b>Enfermedad actual:</b> ${esc(d.illness||'Pendiente')}<br><b>Tier 3:</b> ${esc(d.tiers.filter(Boolean).join(' · ')||'Pendiente')}</div></div>`).join('')}
function expertEvalRows(){const e=state.expert?.phases; if(!e)return `<div class="placeholder">La comparación experta no se guarda dentro del caso para evitar que actúe como pista. Exporta tu desempeño en el Módulo 8, súbelo a ChatGPT y luego puedes importar aquí un archivo de evaluación experta.</div>`;return Object.entries(e).map(([title,d])=>`<div class="eval-row"><div class="eval-label">${esc(title)}</div><div class="eval-value"><b>Enfermedad actual:</b> ${esc(d.illness||'—')}<br><b>Tier 3:</b> ${esc((d.tiers||[]).join(' · ')||'—')}</div></div>`).join('')}
function findingsEval(){const groups={};Object.values(state.selected).forEach(f=>{(groups[f.source]??=[]).push(f.text)});return Object.entries(groups).map(([s,a])=>`<div class="eval-row"><div class="eval-label">${esc(s)}</div><div class="eval-value">${a.map(x=>'• '+esc(x)).join('<br>')}</div></div>`).join('')||'<div class="placeholder">Aún no hay hallazgos seleccionados.</div>'}
function renderM7(){return `<section class="module active"><div class="module-intro"><h1>Módulo 7 — Evaluación</h1><p>Auditoría comparativa. El lado del estudiante se actualiza en tiempo real; el lado experto se carga después de analizar tu JSON aquí en ChatGPT.</p></div><div class="card"><h2>Enfermedad actual y diagnósticos: estudiante vs experto</h2><div class="eval-grid"><div class="eval-col"><h3>Estudiante</h3><div id="studentEval">${studentEvalRows()}</div></div><div class="eval-col"><h3>Experto</h3><div id="expertEval">${expertEvalRows()}</div></div></div></div><div class="card"><h2>Hallazgos seleccionados: estudiante vs experto</h2><div class="eval-grid"><div class="eval-col"><h3>Selección del estudiante</h3><div id="studentFindingsEval">${findingsEval()}</div></div><div class="eval-col"><h3>Selección experta y razón clínica</h3><div id="expertFindingsEval">${state.expert?.findings?renderExpertFindings():'<div class="placeholder">Después del debriefing experto, aquí aparecerán: hallazgos críticos seleccionados, omisiones, distractores elegidos y la razón clínica de cada diferencia.</div>'}</div></div></div></div><div class="card"><h2>Importar evaluación experta</h2><p class="subtle">Opcional. El archivo de evaluación se genera después del análisis detallado en ChatGPT. Su formato no contiene la clave diagnóstica dentro de este caso.</p><div class="import-box"><input type="file" accept="application/json" id="expertFile"><button class="action light" onclick="importExpertEvaluation()">Importar evaluación</button></div></div><div class="footer-actions"><button class="action secondary" onclick="goModule('m6')">Volver</button><button class="action" onclick="goModule('m8')">Continuar a exportar desempeño</button></div></section>`}
function renderExpertFindings(){const data=state.expert?.findings||{};return Object.entries(data).map(([module,items])=>`<div class="eval-row"><div class="eval-label">${esc(module)}</div><div class="eval-value">${(items||[]).map(i=>`<b>${esc(i.finding||'')}</b>${i.reason?`: ${esc(i.reason)}`:''}`).join('<br>')}</div></div>`).join('')||'<div class="placeholder">Sin hallazgos expertos importados.</div>'}
function renderM8(){return `<section class="module active"><div class="module-intro"><h1>Módulo 8 — Exportar desempeño</h1><p>Descarga tu desempeño completo y súbelo aquí para obtener una evaluación profunda módulo por módulo.</p></div><div class="card"><h2>Archivo de desempeño</h2><p>El JSON contiene los datos explorados, hallazgos seleccionados, profundizaciones, enfermedad actual por fase, Tier 3, Venn, manejo y destino.</p><div class="footer-actions" style="justify-content:flex-start"><button class="action" onclick="exportPerformance()">Descargar mi desempeño JSON</button><button class="action secondary" onclick="exportSummary()">Descargar resumen TXT</button><button class="action warn" onclick="resetCase()">Reiniciar caso</button></div></div><div class="card"><h2>Cómo usar el archivo</h2><ol><li>Completa los módulos y descarga el JSON.</li><li>Súbelo en esta conversación.</li><li>Se realizará el Módulo 7 completo: tus enfermedades actuales y diagnósticos vs experto, hallazgos seleccionados vs hallazgos expertos, razones clínicas, errores de proceso y objetivo deliberado.</li></ol></div><div class="footer-actions"><button class="action secondary" onclick="goModule('m7')">Volver a evaluación</button></div></section>`}
const renderers={m1:renderM1,m2:renderM2,m3:renderM3,m4:renderM4,m5:renderM5,m6:renderM6,m7:renderM7,m8:renderM8};
function renderModules(){document.getElementById('modules').innerHTML=renderers[state.current]();if(state.current==='m5'){document.getElementById('app').classList.add('pad-collapsed');renderVenn();}else document.getElementById('app').classList.remove('pad-collapsed');renderTabs();renderPad();}
function renderTabs(){const labels={m1:'1 Triage',m2:'2 Historial',m3:'3 Examen físico',m4:'4 Paraclínicos',m5:'5 Pausa diagnóstica',m6:'6 Manejo',m7:'7 Evaluación',m8:'8 Exportar'};document.getElementById('tabs').innerHTML=Object.entries(labels).map(([k,v])=>`<button class="tab ${state.current===k?'active':''}" onclick="goModule('${k}')">${v}</button>`).join('')}
function goModule(m){state.current=m;save();renderModules();window.scrollTo({top:0,behavior:'smooth'});}
function currentIllness(){return state.fields.ill_m4||state.fields.ill_m3||state.fields.ill_m2||state.fields.ill_m1||''}
function currentSyndrome(){return state.fields.syndrome_m4||state.fields.syndrome_m3||state.fields.syndrome_m2||''}
function currentTier(){const pref=state.fields.tier_m4_1?'tier_m4':state.fields.tier_m3_1?'tier_m3':state.fields.tier_m2_1?'tier_m2':'tier_m1';return [1,2,3].map(i=>state.fields[`${pref}_${i}`]).filter(Boolean).join('\n')}
function renderPad(){document.getElementById('timeBadge').textContent='Módulo '+state.current.replace('m','');document.getElementById('selectedBadge').textContent=selectedCount()+' dato'+(selectedCount()===1?'':'s');const groups={};Object.values(state.selected).forEach(f=>(groups[f.source]??=[]).push(f.text));document.getElementById('padGroups').innerHTML=sourceOrder.map(s=>{const a=groups[s]||[];return `<details ${a.length?'open':''}><summary>${esc(s)} (${a.length})</summary>${a.length?`<ul>${a.map(x=>'<li>'+esc(x)+'</li>').join('')}</ul>`:'<div class="empty">Sin datos seleccionados.</div>'}</details>`}).join('');document.getElementById('padIllness').textContent=currentIllness()||'Pendiente';document.getElementById('padSyndrome').textContent=currentSyndrome()||'Pendiente';document.getElementById('padTier').textContent=currentTier()||'Pendiente';}
function loadTierToVenn(){['1','2','3'].forEach(i=>state.fields['venn_dx'+i]=state.fields['tier_m4_'+i]||state.fields['tier_m3_'+i]||state.fields['tier_m2_'+i]||state.fields['tier_m1_'+i]||'');save();renderModules();}
let dragId=null;
function renderVenn(){const source=document.getElementById('findingSource');if(!source)return;const by={};Object.values(state.selected).forEach(f=>{if(!state.venn.placed[f.id])(by[f.source]??=[]).push(f)});source.innerHTML='<h3 style="margin:0 0 6px">Findings</h3><p class="subtle">Se agrupan por módulo. Al colocarlos en el Venn desaparecen de aquí.</p>'+sourceOrder.map(s=>`<div class="finding-group" data-return-source="${esc(s)}"><div class="finding-group-title">${esc(s)}</div>${(by[s]||[]).map(f=>`<span class="finding-chip" draggable="true" data-id="${f.id}" title="Arrastrar">${esc(f.text)}</span>`).join('')||'<span class="subtle">Sin hallazgos disponibles.</span>'}</div>`).join('');
 document.querySelectorAll('.finding-chip').forEach(el=>el.addEventListener('dragstart',e=>{dragId=el.dataset.id;e.dataTransfer.setData('text/plain',dragId)}));
 document.querySelectorAll('.zone').forEach(z=>{z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('drop-over')});z.addEventListener('dragleave',()=>z.classList.remove('drop-over'));z.addEventListener('drop',e=>{e.preventDefault();z.classList.remove('drop-over');if(!dragId)return;if(z.dataset.zone==='return'){delete state.venn.placed[dragId]}else{const dir=document.getElementById('direction')?.value||'0';state.venn.placed[dragId]={zone:z.dataset.zone,direction:dir}}save();dragId=null;renderVenn();});});
 document.querySelectorAll('[data-return-source]').forEach(g=>{g.addEventListener('dragover',e=>{e.preventDefault();g.classList.add('drop-over')});g.addEventListener('dragleave',()=>g.classList.remove('drop-over'));g.addEventListener('drop',e=>{e.preventDefault();g.classList.remove('drop-over');if(dragId&&state.venn.placed[dragId]){delete state.venn.placed[dragId];save();dragId=null;renderVenn();}})});
 const places=state.venn.placed;const zoneMap={};Object.entries(places).forEach(([id,p])=>(zoneMap[p.zone]??=[]).push([id,p]));document.querySelectorAll('.zone').forEach(z=>{if(z.dataset.zone==='return')return;const title=z.querySelector('.zone-title');(zoneMap[z.dataset.zone]||[]).forEach(([id,p])=>{const f=state.selected[id];if(!f)return;const el=document.createElement('div');el.className='placed';el.draggable=true;el.dataset.id=id;el.innerHTML=`${esc(f.text)} <small>[${esc(p.direction)}]</small>`;el.addEventListener('dragstart',e=>{dragId=id;e.dataTransfer.setData('text/plain',id)});z.appendChild(el);});});
 const log=document.getElementById('vennLog');if(log){log.innerHTML=Object.entries(places).map(([id,p])=>{const f=state.selected[id];return f?`<tr><td>${esc(f.text)}</td><td>${esc(p.zone)}</td><td>${esc(p.direction)}</td></tr>`:''}).join('')||'<tr><td colspan="3" class="subtle">Aún no has colocado hallazgos.</td></tr>';}}
function renderEvaluationStudent(){const el=document.getElementById('studentEval');if(el)el.innerHTML=studentEvalRows();const fs=document.getElementById('studentFindingsEval');if(fs)fs.innerHTML=findingsEval();}
function exportPayload(){return {format:'H-CR v3 performance',exportedAt:new Date().toISOString(),caseType:'cardiaco',selectedFindings:Object.values(state.selected),fields:state.fields,expanded:state.expanded,venn:state.venn,currentModule:state.current};}
function download(name,text,type){const b=new Blob([text],{type});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();URL.revokeObjectURL(a.href)}
function exportPerformance(){download('HCR_v3_desempeno_cardiaco.json',JSON.stringify(exportPayload(),null,2),'application/json')}
function exportSummary(){const d=exportPayload();let out='H-CR v3 — DESEMPEÑO\n\nHALLAZGOS SELECCIONADOS\n';sourceOrder.forEach(s=>{const a=d.selectedFindings.filter(f=>f.source===s);out+=`\n${s.toUpperCase()} (${a.length})\n`+a.map(f=>'• '+f.text).join('\n')+'\n'});out+='\nENFERMEDAD ACTUAL Y DIAGNÓSTICOS\n';Object.entries(d.fields).forEach(([k,v])=>{if(v)out+=`${k}: ${v}\n`});out+='\nPAUSA DIAGNÓSTICA\n';Object.entries(d.venn.placed).forEach(([id,p])=>{const f=d.selectedFindings.find(x=>x.id===id);if(f)out+=`• ${f.text} → ${p.zone} [${p.direction}]\n`});download('HCR_v3_desempeno_cardiaco.txt',out,'text/plain;charset=utf-8')}
function importExpertEvaluation(){const input=document.getElementById('expertFile');const file=input?.files?.[0];if(!file)return alert('Selecciona primero un archivo JSON de evaluación experta.');const r=new FileReader();r.onload=()=>{try{state.expert=JSON.parse(r.result);save();renderModules();}catch(e){alert('El archivo no tiene un formato JSON válido.')}};r.readAsText(file)}
function resetCase(){if(confirm('¿Borrar todos los datos de este caso?')){localStorage.removeItem(STORAGE);location.reload()}}
function togglePad(){document.getElementById('app').classList.toggle('pad-collapsed');document.getElementById('togglePad').textContent=document.getElementById('app').classList.contains('pad-collapsed')?'Mostrar Pad diagnóstico':'Minimizar Pad diagnóstico'}
document.addEventListener('change',e=>{const cb=e.target.closest('input.finding-check');if(!cb)return;selectFinding(cb.dataset.id,cb.dataset.source,cb.dataset.text,cb.checked);renderModules();});
document.getElementById('beginCase').addEventListener('click',()=>{state.started=true;save();document.getElementById('startScreen').style.display='none';document.getElementById('app').style.display='block';renderModules();});document.getElementById('togglePad').addEventListener('click',togglePad);document.getElementById('padSideBtn').addEventListener('click',togglePad);
if(state.started){document.getElementById('startScreen').style.display='none';document.getElementById('app').style.display='block';}renderModules();
</script>
</body>
</html>
