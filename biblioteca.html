<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>H-CR — Biblioteca de casos</title>
<style>
:root{--bg:#f4f6fb;--ink:#172033;--muted:#6a7485;--line:#d8deea;--dark:#172033;--accent:#0ea5e9;--side:#1e293b}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:14px Inter,system-ui,Segoe UI,Arial,sans-serif}.top{height:54px;background:var(--dark);color:#fff;display:flex;align-items:center;padding:0 22px;gap:14px}.top b{font-size:16px}.top a{margin-left:auto;color:#b8c4d6;text-decoration:none;font-size:13px}.layout{display:flex;min-height:calc(100vh - 54px)}aside{width:230px;background:var(--side);color:#cbd5e1;padding:22px 16px}.nav-link{display:flex;align-items:center;gap:9px;color:#fff;background:#0284c7;border-radius:8px;padding:10px;text-decoration:none;font-weight:700}.section{font-size:10px;font-weight:800;letter-spacing:.1em;color:#64748b;margin:24px 0 10px;text-transform:uppercase}.filter{display:block;color:#aab8ca;font-size:12px;padding:4px 0;cursor:pointer}.filter input{accent-color:var(--accent)}.clear{display:block;margin-top:12px;color:#38bdf8;cursor:pointer;font-size:12px;font-weight:700}main{flex:1;min-width:0}.head{background:#fff;border-bottom:1px solid var(--line);padding:18px 24px;display:flex;gap:14px;align-items:center}.head h1{font-size:18px;margin:0}.count{color:var(--muted);font-size:12px}.search{margin-left:auto;border:1px solid var(--line);border-radius:9px;padding:8px 11px;width:240px}.note{padding:10px 24px;background:#f0f9ff;border-bottom:1px solid #7dd3fc;color:#0369a1;font-size:12px;font-weight:600}.wrap{padding:20px 24px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}.case{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:10px}.case h2{font-size:15px;margin:0}.meta{color:var(--muted);font-size:12px}.tag{display:inline-block;background:#e0f2fe;color:#0369a1;border:1px solid #7dd3fc;border-radius:999px;padding:3px 9px;font-size:11px;font-weight:700;width:max-content}.go{margin-top:auto;background:var(--accent);color:#fff;text-decoration:none;text-align:center;border-radius:8px;padding:9px;font-weight:700}.empty{padding:20px;background:#fff;border:1px dashed var(--line);border-radius:10px;color:var(--muted)}@media(max-width:800px){aside{display:none}.head{padding:16px}.wrap{padding:16px}.search{width:160px}}
</style>
</head>
<body>
<header class="top"><b>H-CR v3</b><span>Biblioteca de casos clínicos</span><a href="index.html">← Inicio</a></header>
<div class="layout"><aside><a class="nav-link" href="biblioteca.html">☰ Biblioteca de casos</a><div class="section">Filtros</div><div id="difficultyFilters"></div><span class="clear" onclick="clearFilters()">Limpiar filtros</span></aside><main><div class="head"><div><h1>Biblioteca de casos</h1><span class="count" id="count">Cargando casos…</span></div><input class="search" id="search" placeholder="Buscar por síntoma…" oninput="renderCases()"></div><div class="note">El diagnóstico definitivo solo se revela en el Módulo 7 — Evaluación.</div><div class="wrap"><div class="grid" id="cases"></div></div></main></div>
<script src="data/cases_catalog.js?v=4"></script>
<script>
const catalog=window.HCR_CASES_CATALOG||{cases:[],filters:{difficulties:[]}};
const selectedDifficulty=new Set();
const filterHost=document.getElementById('difficultyFilters');
filterHost.innerHTML=(catalog.filters.difficulties||[]).map(level=>`<label class="filter"><input type="checkbox" value="${level}" onchange="toggleDifficulty(this)"> ${level}</label>`).join('');
function toggleDifficulty(el){el.checked?selectedDifficulty.add(el.value):selectedDifficulty.delete(el.value);renderCases()}
function clearFilters(){selectedDifficulty.clear();document.querySelectorAll('#difficultyFilters input').forEach(x=>x.checked=false);document.getElementById('search').value='';renderCases()}
function textOf(c){return [c.id,c.patient?.displayName,c.patient?.age,c.patient?.sex,c.chiefConcern,c.publicPresentation,c.difficulty,...(c.publicTags?.symptoms||[]),...(c.publicTags?.systems||[]),...(c.publicTags?.keywords||[])].join(' ').toLowerCase()}
function renderCases(){const q=document.getElementById('search').value.trim().toLowerCase();const visible=(catalog.cases||[]).filter(c=>(!q||textOf(c).includes(q))&&(!selectedDifficulty.size||selectedDifficulty.has(c.difficulty)));document.getElementById('count').textContent=`${visible.length} caso${visible.length===1?'':'s'} disponible${visible.length===1?'':'s'}`;document.getElementById('cases').innerHTML=visible.length?visible.map(c=>`<article class="case"><span class="tag">${c.difficulty||'Sin nivel'}</span><h2>${c.patient?.displayName||'Caso clínico'}</h2><div class="meta">${[c.patient?.age&&c.patient.age+' años',c.patient?.sex,c.patient?.setting].filter(Boolean).join(' · ')}</div><strong>${c.chiefConcern||''}</strong><div class="meta">${c.publicPresentation||''}</div><a class="go" href="${c.route}">Iniciar caso →</a></article>`).join(''):'<div class="empty">No hay casos que coincidan con los filtros actuales.</div>'}
renderCases();
</script>
</body></html>
